<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Lost In Orbit</title>
  <style>
    :root {
      --bg-top: #09142a;
      --bg-bottom: #1f3a5f;
      --accent: #ffd166;
      --accent-2: #7bdff2;
      --ink: #f6f7fb;
      --muted: #d8deed;
      --card: rgba(8, 18, 36, 0.62);
      --ring: rgba(255, 209, 102, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 20%, rgba(123, 223, 242, 0.28), transparent 30%),
        radial-gradient(circle at 88% 75%, rgba(255, 209, 102, 0.18), transparent 35%),
        linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
    }

    .stars,
    .stars::before,
    .stars::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(2px 2px at 10% 22%, #fff 20%, transparent 21%),
                        radial-gradient(1px 1px at 70% 12%, #fff 20%, transparent 21%),
                        radial-gradient(2px 2px at 35% 72%, #fff 20%, transparent 21%),
                        radial-gradient(1px 1px at 88% 44%, #fff 20%, transparent 21%),
                        radial-gradient(2px 2px at 60% 84%, #fff 20%, transparent 21%);
      animation: drift 22s linear infinite;
      opacity: 0.65;
      pointer-events: none;
    }

    .stars::before {
      transform: scale(1.2);
      animation-duration: 34s;
      opacity: 0.45;
    }

    .stars::after {
      transform: scale(0.8);
      animation-duration: 16s;
      opacity: 0.35;
    }

    .panel {
      position: relative;
      z-index: 1;
      width: min(92vw, 760px);
      padding: 2.4rem 2rem;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: var(--card);
      backdrop-filter: blur(4px);
      box-shadow: 0 18px 60px rgba(4, 12, 22, 0.45);
      text-align: center;
      animation: rise 800ms ease-out both;
    }

    .code {
      display: inline-block;
      font-family: "Courier New", monospace;
      font-size: clamp(2.4rem, 9vw, 5rem);
      letter-spacing: 0.12em;
      color: var(--accent);
      text-shadow: 0 0 18px var(--ring);
      margin-bottom: 0.8rem;
    }

    h1 {
      font-size: clamp(1.3rem, 4.5vw, 2.3rem);
      margin-bottom: 0.75rem;
    }

    p {
      font-size: clamp(0.98rem, 2.8vw, 1.2rem);
      line-height: 1.5;
      color: var(--muted);
      max-width: 56ch;
      margin: 0 auto;
    }

    .planet {
      width: 90px;
      height: 90px;
      margin: 1.2rem auto 1.4rem;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--accent), #ff9f68);
      box-shadow: inset -10px -12px 0 rgba(0, 0, 0, 0.16), 0 0 26px rgba(255, 209, 102, 0.3);
      position: relative;
    }

    .planet::before {
      content: "";
      position: absolute;
      left: -16px;
      top: 36px;
      width: 122px;
      height: 18px;
      border-radius: 999px;
      border: 3px solid rgba(255, 255, 255, 0.72);
      transform: rotate(-13deg);
    }

    .tag {
      margin-top: 1.2rem;
      color: var(--accent-2);
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @keyframes drift {
      from { transform: translateY(0); }
      to { transform: translateY(-40px); }
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="stars" aria-hidden="true"></div>
  <main class="panel">
    <div class="code">404</div>
    <div class="planet" aria-hidden="true"></div>
    <h1>Transmission Lost</h1>
    <p>Ceci n'est pas une page.</p>
    <p>The resource you requested drifted out of this orbit.</p>
    <div class="tag">Holberton Observatory</div>
  </main>
</body>
</html>
